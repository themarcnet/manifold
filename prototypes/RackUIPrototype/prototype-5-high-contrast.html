<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifold Rack — P5 High Contrast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #0f0; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        .header { height: 48px; background: #000; border-bottom: 2px solid #0f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .hdr-btn { padding: 6px 14px; background: #000; border: 2px solid #0f0; color: #0f0; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .hdr-btn:hover { background: #0f0; color: #000; }
        .hdr-btn.active { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }
        .rack { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .rack-row { flex: 1; display: flex; align-items: stretch; gap: 4px; padding: 4px; background: #050505; }
        .rail { height: 32px; background: #000; display: flex; align-items: center; justify-content: center; border-top: 2px solid #0f0; border-bottom: 2px solid #0f0; position: relative; }
        .rail-glow { position: absolute; height: 4px; background: #0f0; box-shadow: 0 0 15px #0f0; top: 50%; transform: translateY(-50%); }
        .module { flex: 1; background: #0a0a0a; border: 2px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        .module.w2 { flex: 2; }
        .module-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; background: #111; border-bottom: 2px solid #333; cursor: grab; }
        .module-header:active { cursor: grabbing; }
        .module-name { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; }
        .size-badge { font-size: 8px; color: #0f0; padding: 2px 6px; border: 1px solid #0f0; }
        .resize-btn { background: #000; border: 2px solid #0f0; color: #0f0; width: 24px; height: 24px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .resize-btn:hover { background: #0f0; color: #000; }
        .module-body { flex: 1; position: relative; display: flex; flex-direction: column; }
        .port-strip { position: absolute; display: flex; flex-direction: column; gap: 4px; z-index: 5; }
        .port-strip.L { left: 4px; top: 50%; transform: translateY(-50%); }
        .port-strip.R { right: 4px; top: 50%; transform: translateY(-50%); }
        .eport { width: 12px; height: 12px; background: #0f0; cursor: crosshair; }
        .perf-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; }
        .mod-lbl { font-size: 8px; color: #0f0; margin-top: 4px; }

        /* P5: Bold touch grid */
        .patch-wrap { display: none; flex: 1; padding: 8px; overflow-y: auto; }
        .patch-view .perf-wrap { display: none !important; }
        .patch-view .patch-wrap { display: grid !important; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .patch-view .port-strip { display: none; }
        
        .touch-cell { aspect-ratio: 1; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: crosshair; background: #0a0a0a; }
        .touch-cell:hover { border-color: #0f0; }
        .touch-cell.selected { border-color: #0f0; background: #0f02; box-shadow: inset 0 0 20px #0f040; }
        .touch-cell.input { border-left-width: 4px; border-left-color: #0f0; }
        .touch-cell.output { border-right-width: 4px; border-right-color: #0f0; }
        .touch-dot { width: 16px; height: 16px; border-radius: 50%; }
        .touch-dot.audio { background: #0f0; box-shadow: 0 0 10px #0f0; }
        .touch-dot.control { background: #0ff; box-shadow: 0 0 10px #0ff; }
        .touch-dot.output.audio { background: transparent; border: 3px solid #0f0; }
        .touch-dot.output.control { background: transparent; border: 3px solid #0ff; }
        .touch-label { font-size: 7px; color: #0f0; margin-top: 4px; text-align: center; max-width: 90%; overflow: hidden; }

        #wire-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .wire { fill: none; stroke-width: 3; stroke-linecap: square; }
        .wire.audio { stroke: #0f0; }
        .wire.control { stroke: #0ff; }
        .wire.ghost { stroke-dasharray: 8 4; opacity: 0.5; }
        .kb-area { height: 100px; background: #000; border-top: 2px solid #0f0; }
        .kb-rail { height: 24px; display: flex; align-items: center; padding: 0 12px; }
        .kb-body { height: 76px; display: flex; padding: 2px; gap: 2px; }
        .kw { flex: 1; background: #fff; border: 2px solid #fff; position: relative; }
        .kb { position: absolute; right: -30%; top: 0; width: 60%; height: 60%; background: #000; border: 2px solid #fff; z-index: 2; }
        .module.dragging { opacity: 0.5; }
        .drop-ph { border: 2px dashed #0f0; min-height: 60px; }
        .drop-ph.w2 { flex: 2; }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:18px;font-weight:700;color:#0f0;">MANIFOLD</span>
            <span style="font-size:11px;color:#0f0;">P5 — HIGH CONTRAST</span>
        </div>
        <div style="display:flex;gap:8px;">
            <button class="hdr-btn" id="clear-btn" onclick="clearPatches()" style="display:none;">CLEAR</button>
            <button class="hdr-btn" id="view-btn" onclick="toggleView()">PATCH</button>
        </div>
    </div>
    <div class="rack" id="rack">
        <svg id="wire-svg"></svg>
        <div class="rack-row" id="row1"></div>
        <div class="rail" id="rail">
            <span style="font-size:10px;color:#0f0;text-transform:uppercase;letter-spacing:4px;">BUS</span>
        </div>
        <div class="rack-row" id="row2"></div>
    </div>
    <div class="kb-area">
        <div class="kb-rail"><span style="font-size:10px;color:#0f0;text-transform:uppercase;">KEYBOARD</span></div>
        <div class="kb-body">
            <div class="kw"><div class="kb"></div></div><div class="kw"><div class="kb"></div></div><div class="kw"></div>
            <div class="kw"><div class="kb"></div></div><div class="kw"><div class="kb"></div></div><div class="kw"></div>
        </div>
    </div>
</div>
<script>
const MODS=[{id:'adsr',name:'ADSR',row:1,size:'1x1',valid:['1x1','1x2','2x1'],accent:'#0f0',ins:[{id:'adsr-gate',l:'GATE',t:'control'},{id:'adsr-retrig',l:'RETRIG',t:'control'},{id:'adsr-attack-cv',l:'ATK CV',t:'control'},{id:'adsr-decay-cv',l:'DEC CV',t:'control'},{id:'adsr-sustain-cv',l:'SUS CV',t:'control'},{id:'adsr-release-cv',l:'REL CV',t:'control'},{id:'adsr-vel',l:'VEL',t:'control'}],outs:[{id:'adsr-env',l:'ENV',t:'control'},{id:'adsr-inv',l:'INV',t:'control'},{id:'adsr-eoc',l:'EOC',t:'control'}],params:[{l:'ATTACK',v:.05,d:'50ms'},{l:'DECAY',v:.20,d:'200ms'},{l:'SUSTAIN',v:.70,d:'0.70'},{l:'RELEASE',v:.40,d:'400ms'}]},{id:'sample',name:'OSCILLATOR',row:1,size:'1x2',valid:['1x2','2x1','2x2'],accent:'#0ff',ins:[{id:'sample-gate',l:'GATE',t:'control'},{id:'sample-cv',l:'V/OCT',t:'control'},{id:'sample-pitch',l:'PITCH',t:'control'},{id:'sample-fm',l:'FM',t:'control'},{id:'sample-pw',l:'PW',t:'control'},{id:'sample-blend-cv',l:'BLEND CV',t:'control'},{id:'sample-drive-cv',l:'DRIVE CV',t:'control'},{id:'sample-detune-cv',l:'DETUNE CV',t:'control'}],outs:[{id:'sample-out',l:'OUT',t:'audio'},{id:'sample-sub',l:'SUB',t:'audio'}],params:[{l:'MODE',v:0,d:'WAVE'},{l:'WAVEFORM',v:.14,d:'SAW'},{l:'DRIVE',v:.09,d:'1.8'},{l:'UNISON',v:.125,d:'1'},{l:'DETUNE',v:0,d:'0CT'},{l:'SPREAD',v:0,d:'0%'},{l:'PW',v:.5,d:'50%'},{l:'BLEND',v:.5,d:'50%'},{l:'OUTPUT',v:.8,d:'-2DB'},{l:'SRC',v:0,d:'LIVE'},{l:'BARS',v:.0625,d:'1.0'},{l:'ROOT',v:.625,d:'C4'},{l:'START',v:0,d:'0%'},{l:'LENGTH',v:1,d:'100%'},{l:'X-FADE',v:.1,d:'10%'},{l:'BL MODE',v:0,d:'MIX'},{l:'W→S',v:.5,d:'50%'},{l:'S→W',v:0,d:'0%'},{l:'BL PITCH',v:.5,d:'0ST'},{l:'BL DEPTH',v:.5,d:'50%'}]},{id:'filter',name:'FILTER',row:1,size:'1x2',valid:['1x1','1x2','2x1','2x2'],accent:'#0f0',hasSend:true,ins:[{id:'filter-in',l:'IN',t:'audio'},{id:'filter-cutoff-cv',l:'CUTOFF CV',t:'control'},{id:'filter-res-cv',l:'RES CV',t:'control'},{id:'filter-env',l:'ENV',t:'control'},{id:'filter-kbd',l:'KBD',t:'control'},{id:'filter-fm',l:'FM',t:'control'}],outs:[{id:'filter-out',l:'OUT',t:'audio'},{id:'filter-send',l:'SEND',t:'audio'}],params:[{l:'TYPE',v:0,d:'SVF LP'},{l:'CUTOFF',v:.6,d:'3.2KHZ'},{l:'RESO',v:.75,d:'0.75'},{l:'DRIVE',v:0,d:'0%'},{l:'ENV AMT',v:.5,d:'50%'},{l:'KBD TRK',v:1,d:'100%'}]},{id:'fx1',name:'FX1',row:2,size:'1x2',valid:['1x1','1x2','2x1','2x2'],accent:'#0f0',hasRecv:true,ins:[{id:'fx1-in',l:'IN',t:'audio'},{id:'fx1-recv',l:'RECV',t:'audio'},{id:'fx1-mix-cv',l:'MIX CV',t:'control'},{id:'fx1-p1-cv',l:'P1 CV',t:'control'},{id:'fx1-p2-cv',l:'P2 CV',t:'control'},{id:'fx1-xy-x-cv',l:'XY-X CV',t:'control'},{id:'fx1-xy-y-cv',l:'XY-Y CV',t:'control'},{id:'fx1-sc',l:'SIDECHAIN',t:'audio'}],outs:[{id:'fx1-out',l:'OUT',t:'audio'},{id:'fx1-env',l:'ENV FOL',t:'control'}],params:[{l:'FX TYPE',v:0,d:'CHORUS'},{l:'MIX',v:.45,d:'45%'},{l:'XY-X',v:.5,d:'RATE'},{l:'XY-Y',v:.5,d:'DEPTH'},{l:'RATE',v:.3,d:'1.2HZ'},{l:'DEPTH',v:.78,d:'78%'},{l:'FEEDBACK',v:.4,d:'40%'},{l:'SPREAD',v:.6,d:'60%'},{l:'VOICES',v:.5,d:'3'},{l:'P1 MAP',v:0,d:'RATE'},{l:'P2 MAP',v:.2,d:'DEPTH'}]},{id:'fx2',name:'FX2',row:2,size:'1x1',valid:['1x1','1x2','2x1'],accent:'#0ff',ins:[{id:'fx2-in',l:'IN',t:'audio'},{id:'fx2-mix-cv',l:'MIX CV',t:'control'},{id:'fx2-p1-cv',l:'P1 CV',t:'control'},{id:'fx2-p2-cv',l:'P2 CV',t:'control'},{id:'fx2-xy-x-cv',l:'XY-X CV',t:'control'},{id:'fx2-xy-y-cv',l:'XY-Y CV',t:'control'},{id:'fx2-sc',l:'SIDECHAIN',t:'audio'}],outs:[{id:'fx2-out',l:'OUT',t:'audio'},{id:'fx2-env',l:'ENV FOL',t:'control'}],params:[{l:'FX TYPE',v:.47,d:'DELAY'},{l:'MIX',v:.32,d:'32%'},{l:'XY-X',v:.5,d:'TIME'},{l:'XY-Y',v:.5,d:'FB'},{l:'TIME',v:.5,d:'4.8MS'},{l:'FEEDBACK',v:.4,d:'40%'},{l:'P1 MAP',v:0,d:'TIME'},{l:'P2 MAP',v:.2,d:'FB'}]},{id:'eq',name:'EQ8',row:2,size:'1x2',valid:['1x1','1x2','2x1'],accent:'#0f0',ins:[{id:'eq-in',l:'IN',t:'audio'},{id:'eq-b1-freq-cv',l:'B1 FRQ CV',t:'control'},{id:'eq-b1-gain-cv',l:'B1 GAIN CV',t:'control'},{id:'eq-b2-freq-cv',l:'B2 FRQ CV',t:'control'},{id:'eq-b2-gain-cv',l:'B2 GAIN CV',t:'control'},{id:'eq-b3-freq-cv',l:'B3 FRQ CV',t:'control'},{id:'eq-b3-gain-cv',l:'B3 GAIN CV',t:'control'},{id:'eq-b4-freq-cv',l:'B4 FRQ CV',t:'control'},{id:'eq-b4-gain-cv',l:'B4 GAIN CV',t:'control'},{id:'eq-out-cv',l:'OUT CV',t:'control'}],outs:[{id:'eq-out',l:'OUT',t:'audio'}],params:[{l:'B1 TYPE',v:0,d:'LO SHELF'},{l:'B1 FREQ',v:.15,d:'60HZ'},{l:'B1 GAIN',v:.6,d:'+3DB'},{l:'B1 Q',v:.5,d:'0.80'},{l:'B2 TYPE',v:.1,d:'BELL'},{l:'B2 FREQ',v:.25,d:'250HZ'},{l:'B2 GAIN',v:.45,d:'-1DB'},{l:'B2 Q',v:.5,d:'1.00'},{l:'B3 TYPE',v:.1,d:'BELL'},{l:'B3 FREQ',v:.5,d:'1KHZ'},{l:'B3 GAIN',v:.55,d:'+2DB'},{l:'B3 Q',v:.5,d:'1.00'},{l:'B4 TYPE',v:.2,d:'HI SHELF'},{l:'B4 FREQ',v:.8,d:'6KHZ'},{l:'B4 GAIN',v:.5,d:'0DB'},{l:'B4 Q',v:.5,d:'0.80'},{l:'OUTPUT',v:.5,d:'0DB'},{l:'MIX',v:1,d:'100%'}]}];
const PERF_WIRES=[{from:'adsr-env',to:'sample-gate',type:'control'},{from:'sample-out',to:'filter-in',type:'audio'},{from:'fx1-out',to:'fx2-in',type:'audio'},{from:'fx2-out',to:'eq-in',type:'audio'}];
const DEFAULT_PATCHES=[{from:'adsr-env',to:'sample-gate',type:'control'},{from:'sample-out',to:'filter-in',type:'audio'},{from:'filter-send',to:'fx1-recv',type:'audio'},{from:'fx1-out',to:'fx2-in',type:'audio'},{from:'fx2-out',to:'eq-in',type:'audio'},{from:'adsr-env',to:'filter-cutoff-cv',type:'control'},{from:'adsr-inv',to:'fx1-mix-cv',type:'control'},{from:'fx1-env',to:'eq-b2-gain-cv',type:'control'}];
let view='perf',patches=[],selPort=null,selDir=null,selType=null,drag=null;
const connectedPorts=new Set();PERF_WIRES.forEach(w=>{connectedPorts.add(w.from);connectedPorts.add(w.to);});
function perfHTML(m){switch(m.id){case'adsr':return`<div style="width:100%;height:40px;border:2px solid #0f0;display:flex;align-items:flex-end;padding:2px;gap:2px"><div style="flex:1;height:10%;background:#0f0"></div><div style="flex:1;height:10%;background:#0f0"></div><div style="flex:2;height:90%;background:#0f0"></div><div style="flex:3;height:60%;background:#0f0"></div><div style="flex:3;height:60%;background:#0f0"></div></div>`;case'sample':return`<div style="width:100%;height:40px;border:2px solid #0ff;display:flex;align-items:flex-end;padding:2px;gap:1px">${[40,65,30,85,55,95,45,70].map(h=>`<div style="flex:1;height:${h}%;background:#0ff"></div>`).join('')}</div>`;case'filter':return`<div style="width:40px;height:40px;border:2px solid #0f0;margin:0 auto;display:flex;align-items:center;justify-content:center"><div style="width:20px;height:20px;background:#0f0"></div></div>`;case'fx1':return`<div style="font-size:32px;color:#0f0;text-align:center;text-shadow:0 0 10px #0f0">◆</div>`;case'fx2':return`<div style="font-size:28px;color:#0ff;text-align:center;text-shadow:0 0 10px #0ff">◇</div>`;case'eq':return`<div style="display:flex;gap:4px;justify-content:center;height:40px;align-items:flex-end">${[.6,.45,.55,.5].map(v=>`<div style="width:20px;height:${v*100}%;background:#0f0"></div>`).join('')}</div>`;default:return`<span class="mod-lbl">${m.name}</span>`;}}
// P5: Bold touch grid - large squares
function patchHTML(m){
    let cells='';
    // All as large touch cells in a grid
    const allPorts=[...m.ins.map(p=>({...p,isInput:true})),...m.params.map((p,i)=>({...p,id:m.id+'-p'+i,isInput:true,t:'control'})),...m.outs.map(p=>({...p,isInput:false}))];
    allPorts.forEach(p=>{
        cells+=`<div class="touch-cell ${p.isInput?'input':'output'}" data-port="${p.id}" data-type="${p.isInput?'input':'output'}"><div class="touch-dot ${p.t} ${!p.isInput?'output':''}"></div><span class="touch-label">${p.l}</span></div>`;
    });
    return cells;
}
function buildMod(m){const cols=parseInt(m.size.split('x')[1]);const el=document.createElement('div');el.className='module'+(cols>=2?' w2':'');el.dataset.id=m.id;el.innerHTML=`<div class="module-header" style="border-left:3px solid ${m.accent}"><span class="module-name">${m.name}</span><div style="display:flex;align-items:center;gap:4px;"><span class="size-badge">${m.size}</span>${m.valid.length>1?`<button class="resize-btn" data-rid="${m.id}">↻</button>`:''}</div></div><div class="module-body"><div class="perf-wrap">${perfHTML(m)}</div><div class="patch-wrap">${patchHTML(m)}</div><div class="port-strip L">${m.ins.filter(p=>connectedPorts.has(p.id)).map(p=>`<div class="eport" data-port="${p.id}" data-type="input"></div>`).join('')}</div><div class="port-strip R">${m.outs.filter(p=>connectedPorts.has(p.id)).map(p=>`<div class="eport" data-port="${p.id}" data-type="output"></div>`).join('')}</div></div>`;return el;}
function renderModules(){const r1=document.getElementById('row1');r1.innerHTML='';const r2=document.getElementById('row2');r2.innerHTML='';MODS.forEach(m=>{const el=buildMod(m);(m.row===1?r1:r2).appendChild(el);});}
function cycleSize(modId){const m=MODS.find(mm=>mm.id===modId);if(!m)return;const idx=m.valid.indexOf(m.size);m.size=m.valid[(idx+1)%m.valid.length];renderModules();setupInteractions();drawWires();}
function portCenter(portId){const all=document.querySelectorAll(`[data-port="${portId}"]`);const rack=document.getElementById('rack');const rr=rack.getBoundingClientRect();for(const el of all){const r=el.getBoundingClientRect();if(r.width>0&&r.height>0)return{x:r.left+r.width/2-rr.left,y:r.top+r.height/2-rr.top};}return null;}
function drawWires(mx,my){const svg=document.getElementById('wire-svg');svg.innerHTML='';const conns=view==='patch'?patches:PERF_WIRES;conns.forEach(c=>{const f=portCenter(c.from),t=portCenter(c.to);if(!f||!t)return;const p=document.createElementNS('http://www.w3.org/2000/svg','path');if(view==='patch'){const dx=Math.abs(t.x-f.x),dy=Math.abs(t.y-f.y);const droop=Math.min(60,20+dx*0.08+dy*0.06);const my2=Math.max(f.y,t.y)+droop;p.setAttribute('d',`M${f.x},${f.y} C${f.x+40},${my2} ${t.x-40},${my2} ${t.x},${t.y}`);}else{p.setAttribute('d',`M${f.x},${f.y} L${t.x},${t.y}`);}p.classList.add('wire',c.type==='audio'?'audio':'control');svg.appendChild(p);});if(selPort&&mx!==undefined){const f=portCenter(selPort);if(f){const rr=document.getElementById('rack').getBoundingClientRect();const g=document.createElementNS('http://www.w3.org/2000/svg','path');g.setAttribute('d',`M${f.x},${f.y} L${mx-rr.left},${my-rr.top}`);g.classList.add('wire','ghost');svg.appendChild(g);}}updateRailGlow();}
function updateRailGlow(){const rail=document.getElementById('rail');rail.querySelectorAll('.rail-glow').forEach(g=>g.remove());const fEl=document.querySelector('[data-id="filter"]');const xEl=document.querySelector('[data-id="fx1"]');if(!fEl||!xEl)return;const rr=rail.getBoundingClientRect();const fr=fEl.getBoundingClientRect();const xr=xEl.getBoundingClientRect();const glow=document.createElement('div');glow.className='rail-glow';glow.style.left=(Math.min(fr.right,xr.left)-rr.left)+'px';glow.style.width=Math.max(Math.abs(fr.right-xr.left),20)+'px';rail.appendChild(glow);}
function setupInteractions(){document.querySelectorAll('.resize-btn').forEach(btn=>{btn.onclick=(e)=>{e.stopPropagation();cycleSize(btn.dataset.rid);};});document.querySelectorAll('.touch-cell,.eport').forEach(port=>{port.onclick=function(e){e.stopPropagation();if(view!=='patch')return;const pid=this.dataset.port,pdir=this.dataset.type,ptype=this.querySelector('.touch-dot')?.classList.contains('audio')||this.classList.contains('audio')?'audio':'control';if(!selPort){selPort=pid;selDir=pdir;selType=ptype;this.classList.add('selected');}else if(selPort===pid){selPort=null;selDir=null;this.classList.remove('selected');}else if(selDir!==pdir){let from=selPort,to=pid;if(selDir==='input'){from=pid;to=selPort;}patches.push({from,to,type:(ptype==='audio'||selType==='audio')?'audio':'control'});document.querySelectorAll('.touch-cell').forEach(p=>p.classList.remove('selected'));selPort=null;drawWires();}else{document.querySelectorAll('.touch-cell').forEach(p=>p.classList.remove('selected'));selPort=null;}};});document.querySelectorAll('.module-header').forEach(hdr=>{hdr.onmousedown=function(e){if(e.target.closest('.resize-btn'))return;const mod=hdr.closest('.module');const rect=mod.getBoundingClientRect();const ph=document.createElement('div');ph.className='drop-ph'+(mod.classList.contains('w2')?' w2':'');ph.style.flex=mod.classList.contains('w2')?'2':'1';mod.parentElement.insertBefore(ph,mod);drag={el:mod,ph,ox:e.clientX-rect.left,oy:e.clientY-rect.top};mod.classList.add('dragging');mod.style.position='fixed';mod.style.width=rect.width+'px';mod.style.left=rect.left+'px';mod.style.top=rect.top+'px';mod.style.zIndex='1000';e.preventDefault();};});}
document.addEventListener('mousemove',e=>{if(drag){drag.el.style.left=(e.clientX-drag.ox)+'px';drag.el.style.top=(e.clientY-drag.oy)+'px';document.querySelectorAll('.rack-row').forEach(row=>{const rr=row.getBoundingClientRect();if(e.clientY>=rr.top&&e.clientY<=rr.bottom){if(drag.ph.parentElement!==row)row.appendChild(drag.ph);const kids=Array.from(row.querySelectorAll('.module:not(.dragging),.drop-ph'));let before=null;for(const k of kids){if(k===drag.ph)continue;const kr=k.getBoundingClientRect();if(e.clientX<kr.left+kr.width/2){before=k;break;}}if(before)row.insertBefore(drag.ph,before);else row.appendChild(drag.ph);}});}if(selPort&&view==='patch')drawWires(e.clientX,e.clientY);});
document.addEventListener('mouseup',e=>{if(!drag)return;const{el,ph}=drag;el.classList.remove('dragging');el.style.position='';el.style.width='';el.style.left='';el.style.top='';el.style.zIndex='';if(ph.parentElement){const newRow=ph.parentElement.id==='row1'?1:2;const m=MODS.find(mm=>mm.id===el.dataset.id);if(m)m.row=newRow;ph.parentElement.insertBefore(el,ph);ph.remove();}drag=null;setTimeout(()=>{setupInteractions();drawWires();},10);});
function toggleView(){view=view==='perf'?'patch':'perf';document.getElementById('rack').classList.toggle('patch-view',view==='patch');document.getElementById('clear-btn').style.display=view==='patch'?'block':'none';const btn=document.getElementById('view-btn');btn.textContent=view==='patch'?'PERF':'PATCH';btn.classList.toggle('active',view==='patch');if(view==='patch')patches=[...DEFAULT_PATCHES];selPort=null;document.querySelectorAll('.touch-cell').forEach(p=>p.classList.remove('selected'));setTimeout(drawWires,20);}
function clearPatches(){patches=[];selPort=null;document.querySelectorAll('.touch-cell').forEach(p=>p.classList.remove('selected'));drawWires();}
window.addEventListener('load',()=>{renderModules();setupInteractions();drawWires();});
window.addEventListener('resize',drawWires);
</script>
</body>
