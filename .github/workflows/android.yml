name: Android Build

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a]
        api: [29]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            libfreetype6-dev \
            libx11-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libboost-all-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            lua5.4 \
            liblua5.4-dev \
            pkg-config

      - name: Configure CMake
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
        run: |
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.api }} \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja \
            -DMANIFOLD_BUILD_LUA=ON \
            -DMANIFOLD_PLATFORM_ANDROID=ON \
            -DJUCE_BUILD_EXTRAS=OFF \
            -DJUCE_BUILD_EXAMPLES=OFF

      - name: Build Native Library
        run: cmake --build build-android --target ManifoldMobile -j$(nproc)

      - name: Prepare Native Library
        run: |
          # Create proper JNI structure for the APK
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp build-android/ManifoldMobile_artefacts/Release/libManifoldMobile.so android/app/src/main/jniLibs/arm64-v8a/

      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
        run: |
          cd android
          # Create local.properties
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_NDK_HOME}" >> local.properties
          # Build debug APK (auto-signed with debug keys)
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: manifold-android-${{ matrix.abi }}-api${{ matrix.api }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: manifold-android-symbols-${{ matrix.abi }}
          path: build-android/ManifoldMobile_artefacts/Release/**/*.so
          retention-days: 30
